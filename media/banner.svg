<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a64b3c"/>
      <stop offset="100%" stop-color="#c45c4a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="8"/>

  <!-- Subtle top accent line -->
  <rect x="0" y="0" width="800" height="2" fill="url(#accent)" opacity="0.6" rx="8"/>

  <!-- Logo mark -->
  <text x="60" y="105" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="48" font-weight="700" letter-spacing="-0.03em">
    <tspan fill="#a64b3c">e</tspan><tspan fill="#fafafa">ngrammic</tspan>
  </text>

  <!-- Tagline -->
  <text x="60" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#a1a1aa" letter-spacing="0.01em">
    Intelligence that knows what it knows.
  </text>

</svg>
